name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            typescript/pnpm-lock.yaml
            demo/app/pnpm-lock.yaml
            demo/server/pnpm-lock.yaml
            demo/worker/pnpm-lock.yaml

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm ci:install

      - name: Audit production dependencies
        run: pnpm --dir typescript audit --prod --audit-level high

      - name: Run repository checks
        run: pnpm ci:check
