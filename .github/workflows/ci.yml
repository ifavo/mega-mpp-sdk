name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            typescript/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install TypeScript workspace
        run: pnpm --dir typescript install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm --dir typescript audit --prod --audit-level high

      - name: Typecheck
        run: pnpm --dir typescript typecheck

      - name: Lint
        run: pnpm --dir typescript lint && pnpm --dir typescript format:check

      - name: Unit tests
        run: pnpm --dir typescript test

      - name: Integration tests
        run: pnpm --dir typescript test:integration

      - name: Build package
        run: pnpm --dir typescript build

      - name: Install demo dependencies
        run: pnpm demo:install

      - name: Build demo
        run: pnpm demo:build
